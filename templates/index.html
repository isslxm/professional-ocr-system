<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Professional OCR System - AI-Powered Text Recognition, Translation & Speech">
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="OCR Pro">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/static/manifest.json">
    
    <!-- iOS Icons -->
    <link rel="apple-touch-icon" href="/static/icons/icon-192x192.png">
    <link rel="apple-touch-icon" sizes="152x152" href="/static/icons/icon-152x152.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/static/icons/icon-192x192.png">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/static/icons/icon-72x72.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/static/icons/icon-72x72.png">
    
    <title>Professional OCR System</title>
    <style>
        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --success: #00b894;
            --danger: #d63031;
            --warning: #fdcb6e;
            --dark: #2d3436;
            --light: #dfe6e9;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 42px;
            font-weight: 700;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.3);
            margin-bottom: 10px;
        }

        .header .subtitle {
            font-size: 18px;
            opacity: 0.95;
        }

        .status-badge {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            padding: 8px 20px;
            border-radius: 20px;
            margin-top: 15px;
            font-size: 14px;
            backdrop-filter: blur(10px);
        }

        /* Main Grid */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Cards */
        .card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--light);
        }

        .card-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--dark);
        }

        /* Camera Section */
        #video {
            width: 100%;
            height: auto;
            border-radius: 15px;
            background: #000;
            max-height: 400px;
            object-fit: cover;
        }

        .camera-placeholder {
            width: 100%;
            height: 300px;
            background: var(--light);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: #636e72;
        }

        .camera-placeholder-icon {
            font-size: 60px;
            margin-bottom: 15px;
        }

        /* Controls */
        .controls {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 20px;
        }

        .btn {
            padding: 15px 20px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }

        .btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
        }

        .btn-success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }

        .btn-danger {
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
        }

        .btn-warning {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        /* Settings */
        .settings-group {
            margin-bottom: 20px;
        }

        .settings-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: var(--dark);
            margin-bottom: 8px;
        }

        .select-input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid var(--light);
            border-radius: 10px;
            font-size: 15px;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
        }

        .select-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .checkbox-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px;
            background: var(--light);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .checkbox-wrapper:hover {
            background: #c7d3de;
        }

        .checkbox-wrapper input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .checkbox-wrapper label {
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
        }

        /* Result Section */
        .result-box {
            min-height: 200px;
            max-height: 400px;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
            font-size: 16px;
            line-height: 1.7;
            color: var(--dark);
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .result-box:empty:before {
            content: 'Распознанный текст появится здесь...';
            color: #95a5a6;
            font-style: italic;
        }

        /* Audio Player */
        .audio-player {
            margin-top: 15px;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            display: none;
        }

        .audio-player audio {
            width: 100%;
            border-radius: 8px;
        }

        /* Status Messages */
        .status-message {
            padding: 15px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 12px;
            font-weight: 500;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .status-message.info {
            background: #74b9ff;
            color: white;
        }

        .status-message.success {
            background: var(--success);
            color: white;
        }

        .status-message.error {
            background: var(--danger);
            color: white;
        }

        .status-message.warning {
            background: var(--warning);
            color: var(--dark);
        }

        /* Loader */
        .loader {
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            display: none;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .stat-card {
            text-align: center;
            padding: 15px;
            background: var(--light);
            border-radius: 12px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 13px;
            color: #636e72;
            font-weight: 500;
        }

        canvas {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🎯 Professional OCR System</h1>
            <p class="subtitle">AI-Powered Text Recognition, Translation & Speech</p>
            <div class="status-badge" id="serverStatus">
                🔌 Connecting to server...
            </div>
        </div>

        <!-- Status Message -->
        <div id="statusMessage" class="status-message"></div>

        <!-- Main Grid -->
        <div class="main-grid">
            <!-- Left: Camera -->
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">📹 Camera</h2>
                </div>
                
                <video id="video" autoplay playsinline style="display:none;"></video>
                <div id="cameraPlaceholder" class="camera-placeholder">
                    <div class="camera-placeholder-icon">📷</div>
                    <p>Click "Start Camera" to begin</p>
                </div>
                <canvas id="canvas"></canvas>

                <div class="controls">
                    <button id="startCameraBtn" class="btn btn-primary">
                        <span>📹</span> Start Camera
                    </button>
                    <button id="uploadBtn" class="btn btn-primary">
                        <span>📁</span> Upload Photo
                    </button>
                    <button id="captureBtn" class="btn btn-success" disabled>
                        <span>🔍</span> Recognize
                    </button>
                    <button id="processAllBtn" class="btn btn-warning" disabled>
                        <span>⚡</span> Process All
                    </button>
                    <button id="stopCameraBtn" class="btn btn-danger" disabled>
                        <span>⏹️</span> Stop
                    </button>
                </div>

                <input type="file" id="fileInput" accept="image/*" style="display: none;">

                <div class="loader" id="loader"></div>
            </div>

            <!-- Right: Settings -->
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">⚙️ Settings</h2>
                </div>

                <div class="settings-group">
                    <label class="settings-label">OCR Language</label>
                    <select id="ocrLang" class="select-input">
                        <option value="eng">English</option>
                        <option value="rus">Русский</option>
                        <option value="rus+eng">Russian + English</option>
                    </select>
                </div>

                <div class="settings-group">
                    <label class="settings-label">Translate To</label>
                    <select id="translateLang" class="select-input">
                        <option value="">No Translation</option>
                        <option value="en">English</option>
                        <option value="ru">Русский</option>
                        <option value="es">Español</option>
                        <option value="fr">Français</option>
                        <option value="de">Deutsch</option>
                        <option value="zh-CN">中文</option>
                    </select>
                </div>

                <div class="settings-group">
                    <label class="settings-label">Speech Language</label>
                    <select id="speechLang" class="select-input">
                        <option value="en">English</option>
                        <option value="ru">Русский</option>
                        <option value="es">Español</option>
                        <option value="fr">Français</option>
                        <option value="de">Deutsch</option>
                    </select>
                </div>

                <div class="settings-group">
                    <div class="checkbox-wrapper">
                        <input type="checkbox" id="enableTranslation">
                        <label for="enableTranslation">Enable Translation</label>
                    </div>
                </div>

                <div class="settings-group">
                    <div class="checkbox-wrapper">
                        <input type="checkbox" id="enableSpeech">
                        <label for="enableSpeech">Enable Text-to-Speech</label>
                    </div>
                </div>

                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value" id="totalScans">0</div>
                        <div class="stat-label">Total Scans</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="successRate">0%</div>
                        <div class="stat-label">Success Rate</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="avgTime">0s</div>
                        <div class="stat-label">Avg Time</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Results Grid -->
        <div class="main-grid">
            <!-- OCR Result -->
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">📝 Recognized Text</h2>
                    <button id="copyTextBtn" class="btn btn-primary" style="padding: 8px 15px; font-size: 13px;" disabled>
                        📋 Copy
                    </button>
                </div>
                <div id="ocrResult" class="result-box"></div>
            </div>

            <!-- Translation Result -->
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">🌐 Translation</h2>
                    <button id="copyTransBtn" class="btn btn-primary" style="padding: 8px 15px; font-size: 13px;" disabled>
                        📋 Copy
                    </button>
                </div>
                <div id="translationResult" class="result-box"></div>
                
                <div id="audioPlayer" class="audio-player">
                    <audio id="audioElement" controls></audio>
                </div>
            </div>
        </div>
    </div>

    <script>
        // API Configuration
        const API_BASE = window.location.origin;
        
        // Elements
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const cameraPlaceholder = document.getElementById('cameraPlaceholder');
        const startCameraBtn = document.getElementById('startCameraBtn');
        const uploadBtn = document.getElementById('uploadBtn');
        const fileInput = document.getElementById('fileInput');
        const captureBtn = document.getElementById('captureBtn');
        const processAllBtn = document.getElementById('processAllBtn');
        const stopCameraBtn = document.getElementById('stopCameraBtn');
        const ocrResult = document.getElementById('ocrResult');
        const translationResult = document.getElementById('translationResult');
        const loader = document.getElementById('loader');
        const statusMessage = document.getElementById('statusMessage');
        const serverStatus = document.getElementById('serverStatus');
        const audioPlayer = document.getElementById('audioPlayer');
        const audioElement = document.getElementById('audioElement');
        
        // Stats
        let totalScans = 0;
        let successfulScans = 0;
        let totalTime = 0;
        
        let stream = null;
        let currentFrame = null;
        let uploadedImage = null;

        // Check server health
        async function checkServer() {
            try {
                const response = await fetch(`${API_BASE}/api/health`);
                if (response.ok) {
                    serverStatus.textContent = '🟢 Server Online';
                    serverStatus.style.background = 'rgba(0,184,148,0.3)';
                }
            } catch (error) {
                serverStatus.textContent = '🔴 Server Offline';
                serverStatus.style.background = 'rgba(214,48,49,0.3)';
            }
        }

        checkServer();
        setInterval(checkServer, 5000);

        // Show status
        function showStatus(message, type = 'info') {
            statusMessage.textContent = message;
            statusMessage.className = `status-message ${type}`;
            statusMessage.style.display = 'flex';
            
            setTimeout(() => {
                statusMessage.style.display = 'none';
            }, 5000);
        }

        // Start camera
        startCameraBtn.addEventListener('click', async () => {
            try {
                // Проверка поддержки getUserMedia
                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    showStatus('❌ Камера не поддерживается. Требуется HTTPS!', 'error');
                    alert('Для доступа к камере нужен HTTPS.\n\nИспользуйте:\n1. ngrok для HTTPS туннеля\n2. Откройте через https://');
                    return;
                }

                stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: 'environment',
                        width: { ideal: 1920 },
                        height: { ideal: 1080 }
                    }
                });

                video.srcObject = stream;
                video.style.display = 'block';
                cameraPlaceholder.style.display = 'none';

                startCameraBtn.disabled = true;
                captureBtn.disabled = false;
                processAllBtn.disabled = false;
                stopCameraBtn.disabled = false;

                showStatus('📹 Camera started successfully!', 'success');

                // Capture frames
                setInterval(() => {
                    if (stream) {
                        canvas.width = video.videoWidth;
                        canvas.height = video.videoHeight;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(video, 0, 0);
                        currentFrame = canvas.toDataURL('image/jpeg', 0.9);
                    }
                }, 100);

            } catch (error) {
                showStatus('❌ Camera access denied: ' + error.message, 'error');
            }
        });

        // Stop camera
        stopCameraBtn.addEventListener('click', () => {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }

            video.srcObject = null;
            video.style.display = 'none';
            cameraPlaceholder.style.display = 'flex';

            startCameraBtn.disabled = false;
            captureBtn.disabled = true;
            processAllBtn.disabled = true;
            stopCameraBtn.disabled = true;

            currentFrame = null;
            uploadedImage = null;

            showStatus('⏹️ Camera stopped', 'info');
        });

        // Upload photo button
        uploadBtn.addEventListener('click', () => {
            fileInput.click();
        });

        // Handle file upload
        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            
            if (!file) return;

            // Check if it's an image
            if (!file.type.startsWith('image/')) {
                showStatus('❌ Please select an image file', 'error');
                return;
            }

            try {
                showStatus('📁 Loading image...', 'info');

                // Stop camera if running
                if (stream) {
                    stream.getTracks().forEach(track => track.stop());
                    stream = null;
                    video.srcObject = null;
                    startCameraBtn.disabled = false;
                    stopCameraBtn.disabled = true;
                }

                // Read file as data URL
                const reader = new FileReader();
                
                reader.onload = (event) => {
                    const img = new Image();
                    
                    img.onload = () => {
                        // Display image on canvas
                        canvas.width = img.width;
                        canvas.height = img.height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0);

                        // Store as current frame
                        uploadedImage = canvas.toDataURL('image/jpeg', 0.9);
                        currentFrame = uploadedImage;

                        // Create temporary image element for display
                        video.style.display = 'none';
                        cameraPlaceholder.style.display = 'none';

                        // Create or update image display
                        let displayImg = document.getElementById('uploadedImageDisplay');
                        if (!displayImg) {
                            displayImg = document.createElement('img');
                            displayImg.id = 'uploadedImageDisplay';
                            displayImg.style.width = '100%';
                            displayImg.style.height = 'auto';
                            displayImg.style.borderRadius = '15px';
                            displayImg.style.maxHeight = '400px';
                            displayImg.style.objectFit = 'contain';
                            cameraPlaceholder.parentNode.insertBefore(displayImg, cameraPlaceholder);
                        }
                        
                        displayImg.src = uploadedImage;
                        displayImg.style.display = 'block';

                        // Enable buttons
                        captureBtn.disabled = false;
                        processAllBtn.disabled = false;

                        showStatus('✅ Image loaded successfully!', 'success');
                    };

                    img.src = event.target.result;
                };

                reader.readAsDataURL(file);

            } catch (error) {
                showStatus('❌ Error loading image: ' + error.message, 'error');
            }

            // Reset file input
            fileInput.value = '';
        });

        // Simple OCR
        captureBtn.addEventListener('click', async () => {
            const imageToProcess = currentFrame || uploadedImage;
            
            if (!imageToProcess) {
                showStatus('❌ No image to process', 'error');
                return;
            }

            const startTime = Date.now();
            loader.style.display = 'block';
            captureBtn.disabled = true;

            try {
                const response = await fetch(`${API_BASE}/api/recognize`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        image: imageToProcess,
                        lang: document.getElementById('ocrLang').value,
                        preprocess: true
                    })
                });

                const data = await response.json();
                const processingTime = ((Date.now() - startTime) / 1000).toFixed(2);

                if (data.success) {
                    ocrResult.textContent = data.text || '❌ No text detected';
                    document.getElementById('copyTextBtn').disabled = false;
                    
                    totalScans++;
                    successfulScans++;
                    totalTime += parseFloat(processingTime);
                    updateStats();

                    showStatus(`✅ Text recognized in ${processingTime}s`, 'success');
                } else {
                    showStatus('❌ Recognition failed', 'error');
                }

            } catch (error) {
                showStatus('❌ Error: ' + error.message, 'error');
            }

            loader.style.display = 'none';
            captureBtn.disabled = false;
        });

        // Process All (OCR + Translation + Speech)
        processAllBtn.addEventListener('click', async () => {
            const imageToProcess = currentFrame || uploadedImage;
            
            if (!imageToProcess) {
                showStatus('❌ No image to process', 'error');
                return;
            }

            const enableTranslation = document.getElementById('enableTranslation').checked;
            const enableSpeech = document.getElementById('enableSpeech').checked;

            const startTime = Date.now();
            loader.style.display = 'block';
            processAllBtn.disabled = true;

            try {
                const requestData = {
                    image: imageToProcess,
                    ocr_lang: document.getElementById('ocrLang').value,
                    translate_to: enableTranslation ? document.getElementById('translateLang').value : null,
                    speak: enableSpeech,
                    speak_lang: document.getElementById('speechLang').value
                };

                const response = await fetch(`${API_BASE}/api/process`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestData)
                });

                const data = await response.json();
                const processingTime = ((Date.now() - startTime) / 1000).toFixed(2);

                if (data.success) {
                    // OCR Result
                    ocrResult.textContent = data.ocr.text || '❌ No text detected';
                    document.getElementById('copyTextBtn').disabled = false;

                    // Translation
                    if (data.translation) {
                        translationResult.textContent = data.translation.text;
                        document.getElementById('copyTransBtn').disabled = false;
                    }

                    // Audio
                    if (data.audio) {
                        audioElement.src = `${API_BASE}${data.audio.url}`;
                        audioPlayer.style.display = 'block';
                    }

                    totalScans++;
                    successfulScans++;
                    totalTime += parseFloat(processingTime);
                    updateStats();

                    showStatus(`✅ Processing complete in ${processingTime}s`, 'success');

                    if ('vibrate' in navigator) {
                        navigator.vibrate(200);
                    }
                } else {
                    showStatus('❌ Processing failed', 'error');
                }

            } catch (error) {
                showStatus('❌ Error: ' + error.message, 'error');
            }

            loader.style.display = 'none';
            processAllBtn.disabled = false;
        });

        // Copy buttons
        document.getElementById('copyTextBtn').addEventListener('click', () => {
            copyToClipboard(ocrResult.textContent, 'Text copied!');
        });

        document.getElementById('copyTransBtn').addEventListener('click', () => {
            copyToClipboard(translationResult.textContent, 'Translation copied!');
        });

        function copyToClipboard(text, message) {
            navigator.clipboard.writeText(text).then(() => {
                showStatus('📋 ' + message, 'success');
            });
        }

        // Update stats
        function updateStats() {
            document.getElementById('totalScans').textContent = totalScans;
            document.getElementById('successRate').textContent = 
                totalScans > 0 ? Math.round((successfulScans / totalScans) * 100) + '%' : '0%';
            document.getElementById('avgTime').textContent = 
                totalScans > 0 ? (totalTime / totalScans).toFixed(1) + 's' : '0s';
        }
    </script>
